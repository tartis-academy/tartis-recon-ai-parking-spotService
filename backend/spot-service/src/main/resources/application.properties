spring.application.name=spot-service

# Spring no lee el .env por su cuenta: hay que importarlo explicitamente.
# 'optional:' = si no existe el fichero, arranca igual (necesario en CI, donde
# las credenciales llegan como variables de entorno y no hay .env).
# '[.properties]' le dice a Spring que lo parsee como clave=valor aunque la
# extension no sea .properties.
spring.config.import=optional:file:.env[.properties]

# Perfil activo si nadie fija SPRING_PROFILES_ACTIVE (comodo en local). En el
# contenedor de produccion la variable SIEMPRE se fija explicitamente via
# compose/deploy, asi que este default nunca se usa ahi.
spring.profiles.default=dev

# La sesion de JPA NO sigue abierta durante el render de la respuesta.
# En arquitectura hexagonal la infraestructura no debe filtrarse a las capas de
# arriba: si algo no se cargo en el adapter, debe fallar ahi y no en el
# controlador. Ademas Spring avisa por consola si se deja el valor por defecto.
spring.jpa.open-in-view=false

# spring-boot-docker-compose (en el pom) arrancaria el docker-compose.yml solo
# y sobrescribiria la configuracion del perfil activo (dev/prod) con la del
# contenedor. Lo desactivamos: el README y setup.sh gestionan los contenedores
# a mano, y tener dos mecanismos compitiendo hace que estas propiedades se
# ignoren en silencio y no se entienda por que.
spring.docker.compose.enabled=false

# Actuator: solo el endpoint de health, sin exponer el resto (metrics, env...).
# 'probes.enabled' habilita /actuator/health/readiness y /liveness, que es a lo
# que apuntan los healthcheck de Docker/compose para saber si el servicio esta
# listo antes de enrutarle trafico.
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true

# Swagger UI apunta al contrato escrito a mano (openapi.yml), no al spec que
# springdoc generaria escaneando los controladores: el contrato es la fuente de
# verdad. OJO: NO ponemos 'springdoc.api-docs.enabled=false', porque eso apaga
# tambien la propia Swagger UI (su auto-config depende de que api-docs este
# activo) y daria 404 en /swagger-ui/index.html. El endpoint generado
# /v3/api-docs sigue existiendo, pero la UI no lo muestra: solo pinta este url.
# El openapi.yml vive en la raiz del modulo; el build lo copia a static/ dentro
# del jar (ver maven-resources-plugin en el pom), asi hay una sola copia.
springdoc.swagger-ui.url=/openapi.yml

spring.datasource.url=jdbc:postgresql://localhost:5434/spot_db
spring.datasource.username=spot_user
spring.datasource.password=change.me
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
