# Perfil DEV.
#
# Postgres UNICO compartido por los 5 servicios del proyecto (vehicle, spot,
# tariff, ticket, stay), un schema por servicio. Decision documentada en
# Convenciones del proyecto Parking S4: 5 Postgres + pgAdmin + SonarQube es
# inviable en un portatil para 15 personas.
#
# Por eso las variables son DB_* genericas y NO SPOT_DB_* (S3): las 5
# instancias de servicio apuntan al MISMO host/puerto/BD, solo cambia el
# schema. Este Postgres se levanta con ./setup.sh del repo de vehicle-service,
# NO con el docker-compose.yml de este repo (ese es el Postgres dedicado,
# ahora solo para el perfil prod o para levantar este servicio aislado).
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:parking_dev}
spring.datasource.username=${DB_USER:parking_dev}
spring.datasource.password=${DB_PASSWORD:change.me}
spring.jpa.properties.hibernate.default_schema=spot

# Comodo para iterar en local: el schema 'spot' se crea/actualiza solo al
# arrancar, a partir de las entidades.
spring.jpa.hibernate.ddl-auto=update
