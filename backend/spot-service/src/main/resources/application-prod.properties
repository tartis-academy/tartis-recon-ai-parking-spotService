# Perfil PROD.
#
# BD dedicada de este microservicio: database-per-service real (Convenciones
# del proyecto Parking S4). Sigue el patron SPOT_DB_* de S3, sin defaults
# comodos: en prod toda credencial llega por variable de entorno, nunca
# hardcodeada en un fichero versionado.
spring.datasource.url=jdbc:postgresql://${SPOT_DB_HOST}:${SPOT_DB_PORT:5432}/${SPOT_DB_NAME:spot_db}
spring.datasource.username=${SPOT_DB_USER}
spring.datasource.password=${SPOT_DB_PASSWORD}

# En prod no se toca el esquema en caliente. 'validate' hace fallar el
# arranque si el esquema no coincide con las entidades, en vez de alterarlo en
# silencio. Las migraciones versionadas (Flyway/Liquibase) quedan pendientes;
# hasta entonces el esquema de prod se crea/actualiza fuera de banda.
spring.jpa.hibernate.ddl-auto=validate

# Cinturon y tirantes: Boot ya desactiva devtools solo al detectar un jar
# empaquetado (que es como arranca el Dockerfile), pero lo dejamos explicito.
spring.devtools.restart.enabled=false
