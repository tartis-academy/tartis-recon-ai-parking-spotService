# Configuracion SOLO para los tests.
#
# Los tests necesitan una base de datos real porque @SpringBootTest arranca el
# contexto completo, y spring-boot-docker-compose NO se activa durante los tests
# (spring.docker.compose.skip.in-tests viene a true por defecto). Sin estas
# propiedades el contexto ni siquiera arranca: falla con "Failed to determine a
# suitable driver class", porque el application.properties de main solo declara
# spring.application.name.
#
# En local: levanta el entorno antes de testear -> ./setup.sh
# En CI:    el workflow arranca un Postgres como service container.
#
# Las variables permiten al CI sobrescribir sin tocar este fichero.
spring.datasource.url=jdbc:postgresql://${SPOT_DB_HOST:localhost}:${SPOT_DB_PORT:5434}/${SPOT_DB_NAME:spot_db}
spring.datasource.username=${SPOT_DB_USER:spot_user}
spring.datasource.password=${SPOT_DB_PASSWORD:change.me}

# Cada ejecucion parte de un esquema limpio y no deja rastro.
spring.jpa.hibernate.ddl-auto=create-drop
